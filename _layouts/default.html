<!DOCTYPE html>
<html lang="{{ site.lang | default: 'ko-KR' }}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      {% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}
    </title>
    <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | strip_newlines | escape }}" />
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />
    {% if site.google_analytics %}
      <script async src="https://www.googletagmanager.com/gtag/js?id={{ site.google_analytics }}"></script>
      <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag("js", new Date());
        gtag("config", "{{ site.google_analytics }}");
      </script>
    {% endif %}
    {%- feed_meta -%}
  </head>
  <body>
    <div class="container">
      <aside class="sidebar">
        <a class="logo" href="{{ '/' | relative_url }}">{{ site.title }}</a>

        <div class="side-desc">
          {% for line in site.intro_lines %}
            {{ line }}{% unless forloop.last %}<br />{% endunless %}
          {% endfor %}
        </div>

        <nav class="menu">
          {% for item in site.navigation %}
            <a href="{{ item.url | relative_url }}">{{ item.title }}</a>
          {% endfor %}
        </nav>
      </aside>

      <main class="content">
        {{ content }}
      </main>
    </div>
  </body>
</html>
